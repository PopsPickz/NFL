name: Update POPS NFL Data

on:
  workflow_dispatch:

  schedule:
    - cron: "0 11 * * *"
    - cron: "0 17 * * *"
    - cron: "0 23 * * *"

permissions:
  contents: write

concurrency:
  group: update-pops-nfl-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      #################################################
      # BUILD FILES
      #################################################

      - name: Build Schedule
        run: node build-schedule.js

      - name: Build Team Stats
        run: node build-team-stats.js

      - name: Build Passing Ratings
        run: node passing-formula.js

      - name: Build Rushing Ratings
        run: node rushing-formula.js

      - name: Build Receiving Ratings
        run: node receiving-formula.js

      #################################################
      # VERIFY FILES
      #################################################

      - name: Verify Files
        run: |

          test -f schedule.json
          test -f team-stats.json
          test -f passing-ratings.json
          test -f rushing-ratings.json
          test -f receiving-ratings.json

          echo "All files generated successfully."

      #################################################
      # PRINT SUMMARY
      #################################################

      - name: Summary
        run: |

          echo ""
          echo "===== SCHEDULE ====="

          node -e "
          const s=require('./schedule.json');
          console.log({
            week:s.week,
            games:s.gameCount
          });
          "

          echo ""
          echo "===== PASSING ====="

          node -e "
          const p=require('./passing-ratings.json');
          console.log({
            team:p.teams[0].team,
            rating:p.teams[0].rating
          });
          "

          echo ""
          echo "===== RUSHING ====="

          node -e "
          const r=require('./rushing-ratings.json');
          console.log({
            team:r.teams[0].team,
            rating:r.teams[0].rating
          });
          "

          echo ""
          echo "===== RECEIVING ====="

          node -e "
          const r=require('./receiving-ratings.json');
          console.log({
            team:r.teams[0].team,
            rating:r.teams[0].rating
          });
          "

      #################################################
      # COMMIT
      #################################################

      - name: Commit Updated Data
        run: |

          git config user.name "POPS Pickz Bot"
          git config user.email "actions@github.com"

          git add \
            schedule.json \
            team-stats.json \
            passing-ratings.json \
            rushing-ratings.json \
            receiving-ratings.json

          if git diff --cached --quiet
          then
            echo "Nothing changed."
            exit 0
          fi

          git commit -m "Update POPS NFL data"

          git push