name: Update POPS NFL Data

on:
  workflow_dispatch:

  schedule:
    # 7:00 AM Eastern during daylight time
    - cron: "0 11 * * *"

    # 1:00 PM Eastern during daylight time
    - cron: "0 17 * * *"

    # 7:00 PM Eastern during daylight time
    - cron: "0 23 * * *"

permissions:
  contents: write

concurrency:
  group: update-pops-nfl-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build NFL schedule
        run: node build-schedule.js

      - name: Build NFL team statistics
        run: node build-team-stats.js

      - name: Build POPS passing ratings
        run: node passing-formula.js

      - name: Verify data files
        run: |
          if [ ! -f schedule.json ]; then
            echo "schedule.json was not created."
            exit 1
          fi

          if [ ! -f team-stats.json ]; then
            echo "team-stats.json was not created."
            exit 1
          fi

          if [ ! -f passing-ratings.json ]; then
            echo "passing-ratings.json was not created."
            exit 1
          fi

          echo "NFL data files were created successfully."

          echo "Schedule summary:"
          node -e "
          const data = require('./schedule.json');
          console.log({
            season: data.season,
            week: data.week,
            games: data.gameCount
          });
          "

          echo "Team statistics summary:"
          node -e "
          const data = require('./team-stats.json');
          console.log({
            statsSeason: data.statsSeason,
            teams: data.teamCount
          });
          "

          echo "Passing ratings summary:"
          node -e "
          const data = require('./passing-ratings.json');
          console.log({
            statsSeason: data.statsSeason,
            teams: data.teamCount,
            topPassingTeam: data.teams?.[0]?.team,
            topPassingRating: data.teams?.[0]?.rating
          });
          "

      - name: Commit updated NFL data
        run: |
          git config user.name "POPS Pickz Bot"
          git config user.email "actions@github.com"

          git add \
            schedule.json \
            team-stats.json \
            passing-ratings.json

          if git diff --cached --quiet; then
            echo "No NFL data changes to commit."
            exit 0
          fi

          git commit -m "Update NFL data and passing ratings"
          git push